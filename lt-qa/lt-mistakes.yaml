# Lithuanian QA — Seed Mistake Library
# This file ships with the skill and contains known, recurring errors.
# A living copy should be maintained at:
#   github.com/PauliusPadrostis/IT_Curriculum/lt-qa/lt-mistakes.yaml
#
# Format:
#   - wrong: <incorrect form Claude tends to produce>
#     correct: <correct Lithuanian form>
#     category: morphology | calque | spelling | punctuation | register
#     note: <optional explanation>

# ── Morphology: wrong vowel in suffix ──────────────────────────
- wrong: "pakėitėte"
  correct: "pakeitėte"
  category: morphology
  note: "ė→ei diphthong error in past tense 2nd person plural"

- wrong: "pasakykėte"
  correct: "pasakykite"
  category: morphology
  note: "ė insertion in imperative 2nd person plural — correct suffix is -ite"

- wrong: "atsįsėskite"
  correct: "atsisėskite"
  category: morphology
  note: "į insertion error — prefix atsi- has no nosinė"

- wrong: "tolimiausą"
  correct: "tolimiausią"
  category: morphology
  note: "missing i before ą in superlative accusative"

- wrong: "atgniažkite"
  correct: "atgniaužkite"
  category: morphology
  note: "missing u in -iaužk- cluster"

# ── Calques / Anglicisms ──────────────────────────────────────
- wrong: "naturaliai"
  correct: "natūraliai"
  category: spelling
  note: "missing ū — English influence drops the macron"

- wrong: "realizuoti"
  correct: "suvokti / suprasti"
  category: calque
  note: "English 'realize' calque. Use realizuoti only for 'to implement/make real'"

- wrong: "iš esmės"
  correct: "iš tikrųjų / iš tiesų"
  category: calque
  note: "overused as filler; often a calque of 'basically/essentially'"

- wrong: "agresyvus (marketingas)"
  correct: "aktyvus / intensyvus"
  category: calque
  note: "English 'aggressive' calque in non-violent contexts"

- wrong: "adresuoti (problemą)"
  correct: "spręsti / nagrinėti"
  category: calque
  note: "English 'to address (a problem)' calque"

- wrong: "suportinti"
  correct: "palaikyti / remti"
  category: calque
  note: "Direct anglicism from 'support'"

- wrong: "fokusas"
  correct: "dėmesys / dėmesio centras"
  category: calque
  note: "English 'focus' calque — use only in optics context"

# ── Common AI-produced spelling errors ─────────────────────────
- wrong: "prašom"
  correct: "prašome"
  category: spelling
  note: "truncated imperative — needs final -e"

- wrong: "tačiau,"
  correct: "tačiau"
  category: punctuation
  note: "tačiau does NOT take a comma after it when starting a clause"

- wrong: "kadangi,"
  correct: "kadangi"
  category: punctuation
  note: "kadangi does NOT take a comma after it"

# ── Register / formality errors ────────────────────────────────
- wrong: "tu"
  correct: "jūs"
  category: register
  note: "student-facing materials must use formal 'jūs' address"

- wrong: "turi padaryti"
  correct: "turite atlikti"
  category: register
  note: "informal 'tu' + colloquial 'padaryti' → formal 'jūs' + neutral 'atlikti'"

# ── Hallucinated verbs / wrong stems ─────────────────────────
- wrong: "sužimti"
  correct: "suimti"
  category: morphology
  note: "nonexistent verb. Claude merges su- prefix with hallucinated stem žimti. Correct: suimti (to grip/squeeze)"
  source: "user-flagged"
  date: "2026-03-27"

- wrong: "nedžiūrėkite"
  correct: "nežiūrėkite"
  category: morphology
  note: "hallucinated dž cluster. žiūrėti negative imperative = nežiūrėkite, not nedžiūrėkite. Claude confuses with džiūti (to dry)"
  source: "user-flagged"
  date: "2026-03-27"

# ── Missing diacritical marks ────────────────────────────────
- wrong: "pasiubuoti"
  correct: "pasiūbuoti"
  category: spelling
  note: "missing macron on ū. siūbuoti (to sway) → pasiūbuoti. Claude drops macron"
  source: "user-flagged"
  date: "2026-03-27"

# ── Case government errors ───────────────────────────────────
- wrong: "ko stebėti"
  correct: "ką stebėti"
  category: morphology
  note: "stebėti governs accusative (ką), not genitive (ko). Common Claude error with interrogative pronouns before infinitives"
  source: "user-flagged"
  date: "2026-03-27"

# ── Calque: cold call ────────────────────────────────────────
- wrong: "šaltasis kvietimas"
  correct: "klausinėjimas pasirinktinai / tiksliniai klausimai mokiniams"
  category: calque
  note: "English 'cold call' calque. Not a natural Lithuanian pedagogical term. Describe the action instead: klausinėjimas pasirinktinai, arba tiesiog 'klausimai mokiniams'"
  source: "user-flagged"
  date: "2026-03-27"

# ── Unnatural MCQ question stems ─────────────────────────────
- wrong: "Koks rekomenduojamas"
  correct: "Koks yra rekomenduojamas"
  category: calque
  note: "Missing 'yra' in question stem. Lithuanian question stems need the copula. 'Koks rekomenduojamas atstumas' sounds like a translated English 'What recommended distance'. Natural: 'Koks yra rekomenduojamas atstumas'"
  source: "user-flagged"
  date: "2026-03-28"

- wrong: "monitoriaus ekranas"
  correct: "monitorius / ekranas"
  category: calque
  note: "Redundancy: monitorius and ekranas are synonyms in Lithuanian computer terminology. Use one or the other, not both. 'Monitoriaus ekranas' literally means 'monitor's screen' which is tautological"
  source: "user-flagged"
  date: "2026-03-28"

- wrong: "Kokia taisyklinga sėdėjimo laikysena"
  correct: "Kaip reikėtų taisyklingai sėdėti"
  category: calque
  note: "Nominalized question stem sounds unnatural in Lithuanian. Prefer action-oriented phrasing: 'Kaip reikėtų taisyklingai sėdėti prie kompiuterio?' instead of 'Kokia taisyklinga sėdėjimo laikysena prie kompiuterio?'"
  source: "user-flagged"
  date: "2026-03-28"

- wrong: "labiausiai rodo phishing"
  correct: "yra phishing požymis / rodo galimą phishing ataką"
  category: calque
  note: "'Labiausiai rodo phishing' is awkward Lithuanian. Natural alternatives: 'rodo galimą phishing ataką', 'yra phishing požymis', 'kuris iš šių požymių rodo phishing'"
  source: "user-flagged"
  date: "2026-03-28"

# ── Condition-last calque ────────────────────────────────────────
- wrong: "net [daiktavardis] nepakanka, jei"
  correct: "jei [sąlyga], [kilmininkas] nepakaks"
  category: calque
  note: "English 'Even X isn't enough if Y' calque. Lithuanian prefers condition-first with genitive-negative: 'Jei sėdėsite be pertraukos, taisyklingos pozos nepakaks.'"
  source: "user-flagged"
  date: "2026-03-29"

- wrong: "net taisyklinga poza nepakanka"
  correct: "taisyklingos pozos nepakaks / neužtenka"
  category: calque
  note: "Nominative + nepakanka is English pattern. Lithuanian uses genitive + nepakaks/neužtenka for 'X is not enough'."
  source: "user-flagged"
  date: "2026-03-29"

# ── Missing diphthong u in -iaužt- cluster ───────────────────────
- wrong: "sugniažti"
  correct: "sugniaužti"
  category: morphology
  note: "Missing u in -iaužt- cluster. gniaužti → sugniaužti, not sugniažti. Same pattern as atgniaužti."
  source: "user-flagged"
  date: "2026-03-29"

- wrong: "atgniažti"
  correct: "atgniaužti"
  category: morphology
  note: "Missing u in -iaužt- cluster. gniaužti → atgniaužti, not atgniažti."
  source: "user-flagged"
  date: "2026-03-29"

# ── Wrong locative of pertraukėlė ────────────────────────────────
- wrong: "pertraukėje"
  correct: "per pertrauką / pertraukėlėje / pertraukoje"
  category: morphology
  note: "pertraukėje is not a standard Lithuanian form. If using pertrauka → per pertrauką or pertraukoje. If using pertraukėlė → pertraukėlėje. Claude hallucinated pertraukėje by mixing stems."
  source: "user-flagged"
  date: "2026-03-29"

# ── QA root-cause P2 additions (2026-03-30) ────────────────────────
- wrong: "prisistatoma"
  correct: "prisistato"
  category: morphology
  note: "Wrong passive form. 'Prisistatoma' (impersonal passive of prisistatyti) used where reflexive 'prisistato' (presents itself / appears) is needed. Context: describing symptoms or phenomena."
  source: "auto-detected"
  date: "2026-03-30"

- wrong: "Kas yra skirtumas tarp"
  correct: "Kuo skiriasi X nuo Y"
  category: calque
  note: "English calque of 'What is the difference between'. Lithuanian uses verb-based phrasing: 'Kuo skiriasi X nuo Y?' or 'Koks skirtumas tarp X ir Y?'"
  source: "auto-detected"
  date: "2026-03-30"

- wrong: " ,"
  correct: ","
  category: punctuation
  note: "Space before comma (or other punctuation mark). Common AI generation artifact. Also check for space before period, colon, semicolon, question mark, exclamation mark. Pattern: /\\s+[,\\.;:?!]/g"
  source: "auto-detected"
  date: "2026-03-30"

- wrong: "[Terminas], tai [apibrėžimas]"
  correct: "[Terminas] – [apibrėžimas] / vary structure"
  category: calque
  note: "Repetitive definition template where every term is introduced with '[Term], tai [definition]'. This is an AI text pattern. Vary structure: use 'reiškia', 'vadinamas', dash, or integrate the definition into a sentence. Max 2 consecutive definitions using the same structure."
  source: "auto-detected"
  date: "2026-03-30"
