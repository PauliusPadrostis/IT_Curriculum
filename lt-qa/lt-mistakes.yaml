# ── Morphology: wrong vowel in suffix ──────────────────────────
- wrong: "pakėitėte"
  correct: "pakeitėte"
  category: morphology
  note: "ė→ei diphthong error in past tense 2nd person plural"

- wrong: "pasakykėte"
  correct: "pasakykite"
  category: morphology
  note: "ė insertion in imperative 2nd person plural — correct suffix is -ite"

- wrong: "atsįsėskite"
  correct: "atsisėskite"
  category: morphology
  note: "į insertion error — prefix atsi- has no nosinė"

- wrong: "tolimiausą"
  correct: "tolimiausią"
  category: morphology
  note: "missing i before ą in superlative accusative"

- wrong: "atgniažkite"
  correct: "atgniaužkite"
  category: morphology
  note: "missing u in -iaužk- cluster"

# ── Calques / Anglicisms ──────────────────────────────────────
- wrong: "realizuoti"
  correct: "suvokti / suprasti"
  category: calque
  note: "English 'realize' calque. Use realizuoti only for 'to implement/make real'"

- wrong: "iš esmės"
  correct: "iš tikrųjų / iš tiesų"
  category: calque
  note: "overused as filler; often a calque of 'basically/essentially'"

- wrong: "agresyvus (marketingas)"
  correct: "aktyvus / intensyvus"
  category: calque
  note: "English 'aggressive' calque in non-violent contexts"

- wrong: "adresuoti (problemą)"
  correct: "spręsti / nagrinėti"
  category: calque
  note: "English 'to address (a problem)' calque"

- wrong: "suportinti"
  correct: "palaikyti / remti"
  category: calque
  note: "Direct anglicism from 'support'"

- wrong: "fokusas"
  correct: "dėmesys / dėmesio centras"
  category: calque
  note: "English 'focus' calque — use only in optics context"

