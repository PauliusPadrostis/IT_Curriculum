  note: "English 'realize' calque. Use realizuoti only for 'to implement/make real'"

- wrong: "iš esmės"
  correct: "iš tikrųjų / iš tiesų"
  category: calque
  note: "overused as filler; often a calque of 'basically/essentially'"

- wrong: "agresyvus (marketingas)"
  correct: "aktyvus / intensyvus"
  category: calque
  note: "English 'aggressive' calque in non-violent contexts"

- wrong: "adresuoti (problemą)"
