# Lithuanian QA Mistake Library
# Source of truth for Lithuanian language errors in generated content.
#
# STRUCTURE:
#   CRITICAL section (top) — read by every generation skill BEFORE writing.
#     These are the most common LLM failures. ~15 entries, kept small.
#   FULL LIBRARY section (bottom) — used in POST-GEN verification only.
#     Scanned against generated text after writing. Can grow freely.
#
# Format per entry:
#   - wrong: <incorrect form Claude tends to produce>
#     correct: <correct Lithuanian form>
#     category: morphology | calque | spelling | punctuation | register
#     note: <explanation>

# ═══════════════════════════════════════════════════════════════════
# CRITICAL — read before every generation. Stop at FULL LIBRARY marker.
# ═══════════════════════════════════════════════════════════════════

# ── Register ─────────────────────────────────────────────────────
- wrong: "tu / turi padaryti"
  correct: "jūs / turite atlikti"
  category: register
  note: "Student-facing materials must use formal 'jūs'. Informal 'tu' + colloquial 'padaryti' is banned."

# ── Condition-last calque ────────────────────────────────────────
- wrong: "net [X] nepakanka, jei [Y]"
  correct: "jei [Y], [kilmininkas] nepakaks"
  category: calque
  note: "English 'Even X isn't enough if Y'. Lithuanian: condition first, genitive-negative. 'Jei sėdėsite be pertraukos, taisyklingos pozos nepakaks.'"

- wrong: "[nominative] nepakanka"
  correct: "[genitive] nepakaks / neužtenka"
  category: calque
  note: "Nominative + nepakanka is English pattern. Lithuanian uses genitive + nepakaks/neužtenka."

# ── Punctuation ──────────────────────────────────────────────────
- wrong: "tačiau,"
  correct: "tačiau"
  category: punctuation
  note: "tačiau does NOT take a comma after it when starting a clause."

- wrong: "kadangi,"
  correct: "kadangi"
  category: punctuation
  note: "kadangi does NOT take a comma after it."

- wrong: " ,"
  correct: ","
  category: punctuation
  note: "Space before punctuation. AI generation artifact. Check: /\\s+[,\\.;:?!]/g"

# ── Terminology ──────────────────────────────────────────────────
- wrong: "nešiojamas telefonas"
  correct: "mobilusis telefonas"
  category: calque
  note: "Outdated. All phones are portable. Use 'mobilusis telefonas' or just 'telefonas'."

- wrong: "monitoriaus ekranas"
  correct: "monitorius / ekranas"
  category: calque
  note: "Redundancy: monitorius and ekranas are synonyms. Use one, not both."

# ── Calques / anglicisms ────────────────────────────────────────
- wrong: "šaltasis kvietimas"
  correct: "klausinėjimas pasirinktinai"
  category: calque
  note: "English 'cold call' calque. Describe the action instead."

- wrong: "Kokia taisyklinga sėdėjimo laikysena"
  correct: "Kaip reikėtų taisyklingai sėdėti"
  category: calque
  note: "Nominalized question stem. Prefer action-oriented phrasing."

- wrong: "Koks rekomenduojamas"
  correct: "Koks yra rekomenduojamas"
  category: calque
  note: "Missing 'yra' in question stem. Lithuanian needs the copula."

# ── AI text patterns ─────────────────────────────────────────────
- wrong: "[Terminas], tai [apibrėžimas]"
  correct: "vary: reiškia / vadinamas / dash / integrate"
  category: calque
  note: "Repetitive ', tai' definition pattern. Max 2 consecutive same-structure definitions."

# ── Hallucinated forms ───────────────────────────────────────────
- wrong: "pertraukėje"
  correct: "per pertrauką / pertraukoje / pertraukėlėje"
  category: morphology
  note: "Not a real word. pertrauka → pertraukoje. pertraukėlė → pertraukėlėje."

- wrong: "naturaliai"
  correct: "natūraliai"
  category: spelling
  note: "Missing ū macron. English influence."

